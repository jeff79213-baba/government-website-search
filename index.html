<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1a73e8">
  <meta name="description" content="快速找到正確的臺灣政府機關網站">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icon.svg">
  <title>政府網站快速搜尋</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <div class="header-inner">
      <h1 class="logo">政府網站快速搜尋</h1>
      <p class="subtitle">輸入關鍵字，一秒找到正確的政府官網</p>
    </div>
  </header>

  <main>
    <!-- 搜尋區 -->
    <section class="search-section">
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="輸入關鍵字，如：房屋稅、勞保、戶政…" autocomplete="off">
        <button id="searchBtn" aria-label="搜尋">🔍</button>
      </div>
    </section>

    <!-- 分類過濾 -->
    <section class="categories-section" id="categoriesSection">
      <button class="category-chip active" data-category="all">全部</button>
    </section>

    <!-- 載入狀態 -->
    <div class="loading" id="loadingIndicator">載入中…</div>

    <!-- 結果統計 -->
    <div class="result-stats" id="resultStats"></div>

    <!-- 結果列表 -->
    <section class="results-section" id="resultsSection">
      <div id="resultsList"></div>
    </section>

    <!-- 提交新網址 -->
    <section class="submit-section">
      <button class="submit-toggle" id="submitToggle">＋ 提交新網址</button>
      <div class="submit-form" id="submitForm">
        <input type="text" id="submitName" placeholder="網站名稱（如：臺北市稅捐稽徵處）">
        <input type="url" id="submitUrl" placeholder="網址（如：https://tpctax.gov.taipei/）">
        <select id="submitCategory">
          <option value="">選分類</option>
        </select>
        <input type="text" id="submitCity" placeholder="縣市（非縣市限定留空）">
        <input type="text" id="submitTags" placeholder="關鍵字標籤，逗號分隔（如：房屋稅,稅率,臺北）">
        <textarea id="submitDesc" placeholder="簡短說明" rows="2"></textarea>
        <button id="submitBtn" class="btn-primary">送出審核</button>
        <div id="submitMessage" class="submit-message"></div>
      </div>
    </section>
  </main>

  <footer>
    <p>網址由人工審核維護 · 資料可匯出 · <a href="#" id="exportBtn">匯出資料</a></p>
  </footer>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
  <script src="app.js"></script>

  <!-- Service Worker -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }
  </script>

</body>
</html>
